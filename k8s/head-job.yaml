# Mosaic Head Job - runs the optimisation script
apiVersion: batch/v1
kind: Job
metadata:
  name: mosaic-head
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: head
          image: mosaic-worker:latest
          imagePullPolicy: Never
          args:
            - /app/k8s_inversion.py
            - --head
          env:
            - name: MONITOR_HOST
              value: "mosaic-monitor"
            - name: MONITOR_PORT
              value: "3000"
            - name: PUBSUB_PORT
              value: "3001"
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
