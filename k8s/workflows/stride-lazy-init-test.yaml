apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: stride-lazy-
spec:
  entrypoint: stride-dag
  serviceAccountName: stride-workflow

  # Auto-terminate so the workflow doesn't hang indefinitely once worker-1
  # has dropped and the accumulator stalls waiting for worker_1.pkl.
  activeDeadlineSeconds: 1200

  arguments:
    parameters:
      - name: workers-per-node
        value: "1"
      - name: monitor-port
        value: "3000"
      - name: pubsub-port
        value: "3001"
      - name: image
        value: stride-k8s:latest
      - name: exp-name
        value: lazy-init-test
      - name: num-iters
        value: "8"
      - name: drop-threshold
        value: "0.3"
      # Worker-1 kills itself after this many seconds.
      - name: drop-delay
        value: "200"
      # Worker-2 phones home after this many seconds (must be > drop-delay but
      # short enough to be registered before iter 1's adjoint pass begins).
      - name: join-delay
        value: "210"

  templates:
    # ── DAG ──────────────────────────────────────────────────────────────
    - name: stride-dag
      dag:
        tasks:
          - name: create-service
            template: monitor-service

          # Head waits for both worker-0 and worker-1 before starting.
          - name: head
            template: head
            dependencies: [create-service]

          # Worker 0 — connects immediately, stays alive the whole run.
          - name: worker-0
            template: worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "0"

          # Worker 1 — connects immediately, drops after drop-delay seconds.
          # Exercises deregister_runtime pruning it from _proxies.
          - name: worker-1-mortal
            template: mortal-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "1"

          # Replacement worker — joins after join-delay seconds using the same
          # index as the dropped worker (1) so it writes worker_1.pkl and the
          # accumulator unblocks. Lazy-init still fires because deregister_runtime
          # pruned the old worker:1:0 proxy, so the new connection gets a fresh tessera.
          - name: worker-1-replacement
            template: late-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "1"

          # Accumulator expects worker_0.pkl and worker_1.pkl per iteration.
          # After worker-1 drops it will stall — workflow terminates via
          # activeDeadlineSeconds before it hangs forever.
          - name: gradient-accumulator
            template: gradient-accumulator
            dependencies: [create-service]

    # ── K8s Service ──────────────────────────────────────────────────────
    - name: monitor-service
      resource:
        action: apply
        manifest: |
          apiVersion: v1
          kind: Service
          metadata:
            name: monitor-svc-{{workflow.name}}
            namespace: {{workflow.namespace}}
            ownerReferences:
              - apiVersion: argoproj.io/v1alpha1
                kind: Workflow
                name: {{workflow.name}}
                uid: {{workflow.uid}}
          spec:
            selector:
              role: head
              workflow: {{workflow.name}}
            ports:
              - name: rpc
                port: {{workflow.parameters.monitor-port}}
                targetPort: {{workflow.parameters.monitor-port}}
              - name: pubsub
                port: {{workflow.parameters.pubsub-port}}
                targetPort: {{workflow.parameters.pubsub-port}}

    # ── Head ─────────────────────────────────────────────────────────────
    - name: head
      metadata:
        labels:
          role: head
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.cli.mrun
          - --dynamic
          - --address
          - "0.0.0.0"
          - --port
          - "{{workflow.parameters.monitor-port}}"
          - -nw
          - "0"
          - python3
          - k8s_runner.py
        env:
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          # Wait for both worker-0 and worker-1 before starting.
          - name: NUM_WORKERS
            value: "2"
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: DROP_THRESHOLD
            value: "{{workflow.parameters.drop-threshold}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: RUN_MODE
            value: "inverse_artifacts"
          - name: EXP_NAME
            value: "{{workflow.parameters.exp-name}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        volumeMounts:
          - name: exps
            mountPath: /app/stride/exps
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi
      volumes:
        - name: exps
          hostPath:
            path: /data/stride-exps
            type: DirectoryOrCreate

    # ── Worker 0 — permanent ──────────────────────────────────────────
    - name: worker
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Worker {{inputs.parameters.index}} starting: POD_IP=$POD_IP MONITOR_HOST=$MONITOR_HOST"
            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Worker 1 — drops after drop-delay seconds ─────────────────────
    - name: mortal-worker
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Worker {{inputs.parameters.index}} starting (will drop after {{workflow.parameters.drop-delay}}s)"

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1 &
            MRUN_PID=$!

            sleep {{workflow.parameters.drop-delay}}
            echo "=== Simulating node drop: killing worker {{inputs.parameters.index}} ==="
            kill $MRUN_PID
            wait $MRUN_PID 2>/dev/null || true
            echo "Worker {{inputs.parameters.index}} dropped."
            exit 0
        env:
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Worker 2 — replacement, joins after join-delay seconds ────────
    - name: late-worker
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            echo "Replacement worker {{inputs.parameters.index}} waiting {{workflow.parameters.join-delay}}s before connecting..."
            sleep {{workflow.parameters.join-delay}}

            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "=== Replacement worker {{inputs.parameters.index}} connecting: POD_IP=$POD_IP ==="

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Gradient accumulator ──────────────────────────────────────────
    - name: gradient-accumulator
      daemon: true
      metadata:
        labels:
          role: gradient-accumulator
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.runtime.gradient_accumulator
        env:
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "250m"
            memory: 1Gi
