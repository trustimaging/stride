apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: stride-multi-drop-rj-
spec:
  entrypoint: stride-dag
  serviceAccountName: stride-workflow

  activeDeadlineSeconds: 3600

  arguments:
    parameters:
      - name: workers-per-node
        value: "1"
      - name: monitor-port
        value: "3000"
      - name: pubsub-port
        value: "3001"
      - name: image
        value: stride-k8s:latest
      - name: exp-name
        value: multi-drop-rejoin-test
      - name: num-iters
        value: "4"

      - name: drop-threshold
        value: "0"

      # Nodes 6 and 7 drop during adjoint; replacements join shortly after.
      - name: drop-delay-1
        value: "180"
      - name: drop-delay-2
        value: "185"
      - name: join-delay-1
        value: "210"
      - name: join-delay-2
        value: "218"

  templates:
    # ── DAG ──────────────────────────────────────────────────────────────────
    - name: stride-dag
      dag:
        tasks:
          - name: create-service
            template: monitor-service

          - name: head
            template: head
            dependencies: [create-service]

          # 6 permanent nodes (indices 0-5)
          - name: workers
            template: worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "{{item}}"
            withSequence:
              count: "6"

          # Node 6 — drops after drop-delay-1
          - name: node-6-mortal
            template: mortal-worker-1
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "6"

          # Node 7 — drops after drop-delay-2
          - name: node-7-mortal
            template: mortal-worker-2
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "7"

          # Replacement node 6 — joins after join-delay-1
          - name: node-6-replacement
            template: late-worker-1
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "6"

          # Replacement node 7 — joins after join-delay-2
          - name: node-7-replacement
            template: late-worker-2
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "7"

          - name: gradient-accumulator
            template: gradient-accumulator
            dependencies: [create-service]

    # ── K8s Service ───────────────────────────────────────────────────────────
    - name: monitor-service
      resource:
        action: apply
        manifest: |
          apiVersion: v1
          kind: Service
          metadata:
            name: monitor-svc-{{workflow.name}}
            namespace: {{workflow.namespace}}
            ownerReferences:
              - apiVersion: argoproj.io/v1alpha1
                kind: Workflow
                name: {{workflow.name}}
                uid: {{workflow.uid}}
          spec:
            selector:
              role: head
              workflow: {{workflow.name}}
            ports:
              - name: rpc
                port: {{workflow.parameters.monitor-port}}
                targetPort: {{workflow.parameters.monitor-port}}
              - name: pubsub
                port: {{workflow.parameters.pubsub-port}}
                targetPort: {{workflow.parameters.pubsub-port}}

    # ── Head ──────────────────────────────────────────────────────────────────
    - name: head
      metadata:
        labels:
          role: head
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.cli.mrun
          - --dynamic
          - --address
          - "0.0.0.0"
          - --port
          - "{{workflow.parameters.monitor-port}}"
          - -nw
          - "0"
          - python3
          - k8s_runner.py
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: NUM_WORKERS
            value: "8"
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: DROP_THRESHOLD
            value: "{{workflow.parameters.drop-threshold}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: RUN_MODE
            value: "inverse_test"
          - name: EXP_NAME
            value: "{{workflow.parameters.exp-name}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
          - name: BASELINE_PATH
            value: "/app/stride/k8s/tests/baselines/vp_100x100_4iter.npy"
          - name: BASELINE_TOLERANCE
            value: "0.05"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Permanent nodes (indices 0-5) ─────────────────────────────────────────
    - name: worker
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Node {{inputs.parameters.index}} starting: POD_IP=$POD_IP MONITOR_HOST=$MONITOR_HOST"
            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Node 6 — drops after drop-delay-1 (180s) ─────────────────────────────
    - name: mortal-worker-1
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Node {{inputs.parameters.index}} starting (drops after {{workflow.parameters.drop-delay-1}}s)"

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1 &
            MRUN_PID=$!

            sleep {{workflow.parameters.drop-delay-1}}
            echo "=== Simulating node drop: killing node {{inputs.parameters.index}} ==="
            kill $MRUN_PID
            wait $MRUN_PID 2>/dev/null || true
            echo "Node {{inputs.parameters.index}} dropped."
            exit 0
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Node 7 — drops after drop-delay-2 (185s) ─────────────────────────────
    - name: mortal-worker-2
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Node {{inputs.parameters.index}} starting (drops after {{workflow.parameters.drop-delay-2}}s)"

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1 &
            MRUN_PID=$!

            sleep {{workflow.parameters.drop-delay-2}}
            echo "=== Simulating node drop: killing node {{inputs.parameters.index}} ==="
            kill $MRUN_PID
            wait $MRUN_PID 2>/dev/null || true
            echo "Node {{inputs.parameters.index}} dropped."
            exit 0
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Replacement node 6 — joins after join-delay-1 (210s) ──────────────────
    - name: late-worker-1
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            echo "Replacement node {{inputs.parameters.index}} waiting {{workflow.parameters.join-delay-1}}s before connecting..."
            sleep {{workflow.parameters.join-delay-1}}

            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "=== Replacement node {{inputs.parameters.index}} connecting: POD_IP=$POD_IP ==="

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Replacement node 7 — joins after join-delay-2 (218s) ──────────────────
    - name: late-worker-2
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            echo "Replacement node {{inputs.parameters.index}} waiting {{workflow.parameters.join-delay-2}}s before connecting..."
            sleep {{workflow.parameters.join-delay-2}}

            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "=== Replacement node {{inputs.parameters.index}} connecting: POD_IP=$POD_IP ==="

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw {{workflow.parameters.workers-per-node}} \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Gradient accumulator ──────────────────────────────────────────────────
    - name: gradient-accumulator
      daemon: true
      metadata:
        labels:
          role: gradient-accumulator
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.runtime.gradient_accumulator
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "250m"
            memory: 1Gi
