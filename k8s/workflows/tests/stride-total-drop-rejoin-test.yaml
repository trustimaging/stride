apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: stride-total-drop-rj-
spec:
  entrypoint: stride-dag
  serviceAccountName: stride-workflow

  activeDeadlineSeconds: 3600

  arguments:
    parameters:
      - name: workers-per-node
        value: "1"
      - name: monitor-port
        value: "3000"
      - name: pubsub-port
        value: "3001"
      - name: image
        value: stride-k8s:latest
      - name: exp-name
        value: total-drop-rejoin-test
      - name: num-iters
        value: "4"

      - name: drop-threshold
        value: "0"

      # All 4 nodes drop after drop-delay, then rejoin after blackout-delay
      # more seconds. Rejoin is staggered per node via rejoin-extra.
      - name: drop-delay
        value: "200"
      - name: blackout-delay
        value: "30"

  templates:
    # ── DAG ──────────────────────────────────────────────────────────────────
    - name: stride-dag
      dag:
        tasks:
          - name: create-service
            template: monitor-service

          - name: head
            template: head
            dependencies: [create-service]

          - name: node-0
            template: drop-rejoin-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "0"
                - name: rejoin-extra
                  value: "0"

          - name: node-1
            template: drop-rejoin-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "1"
                - name: rejoin-extra
                  value: "10"

          - name: node-2
            template: drop-rejoin-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "2"
                - name: rejoin-extra
                  value: "20"

          - name: node-3
            template: drop-rejoin-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "3"
                - name: rejoin-extra
                  value: "30"

          - name: gradient-accumulator
            template: gradient-accumulator
            dependencies: [create-service]

    # ── K8s Service ───────────────────────────────────────────────────────────
    - name: monitor-service
      resource:
        action: apply
        manifest: |
          apiVersion: v1
          kind: Service
          metadata:
            name: monitor-svc-{{workflow.name}}
            namespace: {{workflow.namespace}}
            ownerReferences:
              - apiVersion: argoproj.io/v1alpha1
                kind: Workflow
                name: {{workflow.name}}
                uid: {{workflow.uid}}
          spec:
            selector:
              role: head
              workflow: {{workflow.name}}
            ports:
              - name: rpc
                port: {{workflow.parameters.monitor-port}}
                targetPort: {{workflow.parameters.monitor-port}}
              - name: pubsub
                port: {{workflow.parameters.pubsub-port}}
                targetPort: {{workflow.parameters.pubsub-port}}

    # ── Head ──────────────────────────────────────────────────────────────────
    - name: head
      metadata:
        labels:
          role: head
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.cli.mrun
          - --dynamic
          - --debug
          - --address
          - "0.0.0.0"
          - --port
          - "{{workflow.parameters.monitor-port}}"
          - -nw
          - "0"
          - python3
          - k8s_runner.py
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: NUM_WORKERS
            value: "4"
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: DROP_THRESHOLD
            value: "{{workflow.parameters.drop-threshold}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: RUN_MODE
            value: "inverse_test"
          - name: EXP_NAME
            value: "{{workflow.parameters.exp-name}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
          - name: BASELINE_PATH
            value: "/app/stride/k8s/tests/baselines/vp_100x100_4iter.npy"
          - name: BASELINE_TOLERANCE
            value: "0.05"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Drop-rejoin worker (single pod: start → kill → wait → restart) ────────
    - name: drop-rejoin-worker
      daemon: true
      inputs:
        parameters:
          - name: index
          - name: rejoin-extra
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Node {{inputs.parameters.index}} starting (drop after ${DROP_DELAY}s, rejoin after ${BLACKOUT_DELAY}+{{inputs.parameters.rejoin-extra}}s)"

            # Phase 1: run normally
            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw $WORKERS_PER_NODE \
              -i {{inputs.parameters.index}} 2>&1 &
            MRUN_PID=$!

            sleep $DROP_DELAY
            echo "=== Simulating node drop: killing node {{inputs.parameters.index}} ==="
            kill $MRUN_PID
            wait $MRUN_PID 2>/dev/null || true
            echo "Node {{inputs.parameters.index}} dropped."

            # Phase 2: blackout + staggered rejoin
            REJOIN_WAIT=$((BLACKOUT_DELAY + {{inputs.parameters.rejoin-extra}}))
            echo "Node {{inputs.parameters.index}} waiting ${REJOIN_WAIT}s before rejoining..."
            sleep $REJOIN_WAIT

            # Phase 3: rejoin
            echo "=== Node {{inputs.parameters.index}} rejoining ==="
            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw $WORKERS_PER_NODE \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: DROP_DELAY
            value: "{{workflow.parameters.drop-delay}}"
          - name: BLACKOUT_DELAY
            value: "{{workflow.parameters.blackout-delay}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Gradient accumulator ──────────────────────────────────────────────────
    - name: gradient-accumulator
      daemon: true
      metadata:
        labels:
          role: gradient-accumulator
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.runtime.gradient_accumulator
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "250m"
            memory: 1Gi
