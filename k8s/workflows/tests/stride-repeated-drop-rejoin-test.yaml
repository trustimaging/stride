apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: stride-repeated-drop-rj-
spec:
  entrypoint: stride-dag
  serviceAccountName: stride-workflow

  activeDeadlineSeconds: 3600

  arguments:
    parameters:
      - name: workers-per-node
        value: "1"
      - name: monitor-port
        value: "3000"
      - name: pubsub-port
        value: "3001"
      - name: image
        value: stride-k8s:latest
      - name: exp-name
        value: repeated-drop-rejoin-test
      - name: num-iters
        value: "4"

      - name: drop-threshold
        value: "0"

      # Node 4: drops 3 times, each replacement is a fresh pod.
      #   mortal-4a drops at 160s, replacement-4a joins at 180s (runs 20s)
      #   mortal-4b drops at ~200s, replacement-4b joins at 215s (runs 20s)
      #   mortal-4c drops at ~235s, replacement-4c joins at 250s (final, stays alive)
      #
      # Node 5: same pattern, staggered 5s later.
      #   mortal-5a drops at 165s, replacement-5a joins at 185s (runs 20s)
      #   mortal-5b drops at ~205s, replacement-5b joins at 220s (runs 20s)
      #   mortal-5c drops at ~225s, replacement-5c joins at 255s (final, stays alive)

  templates:
    # ── DAG ──────────────────────────────────────────────────────────────────
    - name: stride-dag
      dag:
        tasks:
          - name: create-service
            template: monitor-service

          - name: head
            template: head
            dependencies: [create-service]

          # 4 permanent nodes (indices 0-3)
          - name: node-0
            template: worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "0"
          - name: node-1
            template: worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "1"
          - name: node-2
            template: worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "2"
          - name: node-3
            template: worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "3"

          # ── Node 4 chain: mortal → replacement-mortal → replacement-mortal → final ──
          - name: node-4a-mortal
            template: mortal-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "4"
                - name: drop-delay
                  value: "160"

          - name: node-4a-replacement
            template: late-mortal-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "4"
                - name: join-delay
                  value: "180"
                - name: run-duration
                  value: "20"

          - name: node-4b-replacement
            template: late-mortal-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "4"
                - name: join-delay
                  value: "215"
                - name: run-duration
                  value: "20"

          - name: node-4c-final
            template: late-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "4"
                - name: join-delay
                  value: "250"

          # ── Node 5 chain: same pattern, staggered 5s ──
          - name: node-5a-mortal
            template: mortal-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "5"
                - name: drop-delay
                  value: "165"

          - name: node-5a-replacement
            template: late-mortal-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "5"
                - name: join-delay
                  value: "185"
                - name: run-duration
                  value: "20"

          - name: node-5b-replacement
            template: late-mortal-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "5"
                - name: join-delay
                  value: "220"
                - name: run-duration
                  value: "20"

          - name: node-5c-final
            template: late-worker
            dependencies: [create-service]
            arguments:
              parameters:
                - name: index
                  value: "5"
                - name: join-delay
                  value: "255"

          - name: gradient-accumulator
            template: gradient-accumulator
            dependencies: [create-service]

    # ── K8s Service ───────────────────────────────────────────────────────────
    - name: monitor-service
      resource:
        action: apply
        manifest: |
          apiVersion: v1
          kind: Service
          metadata:
            name: monitor-svc-{{workflow.name}}
            namespace: {{workflow.namespace}}
            ownerReferences:
              - apiVersion: argoproj.io/v1alpha1
                kind: Workflow
                name: {{workflow.name}}
                uid: {{workflow.uid}}
          spec:
            selector:
              role: head
              workflow: {{workflow.name}}
            ports:
              - name: rpc
                port: {{workflow.parameters.monitor-port}}
                targetPort: {{workflow.parameters.monitor-port}}
              - name: pubsub
                port: {{workflow.parameters.pubsub-port}}
                targetPort: {{workflow.parameters.pubsub-port}}

    # ── Head ──────────────────────────────────────────────────────────────────
    - name: head
      metadata:
        labels:
          role: head
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.cli.mrun
          - --dynamic
          - --address
          - "0.0.0.0"
          - --port
          - "{{workflow.parameters.monitor-port}}"
          - -nw
          - "0"
          - python3
          - k8s_runner.py
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: NUM_WORKERS
            value: "6"
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: DROP_THRESHOLD
            value: "{{workflow.parameters.drop-threshold}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: RUN_MODE
            value: "inverse_test"
          - name: EXP_NAME
            value: "{{workflow.parameters.exp-name}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
          - name: BASELINE_PATH
            value: "/app/stride/k8s/tests/baselines/vp_100x100_4iter.npy"
          - name: BASELINE_TOLERANCE
            value: "0.05"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Permanent worker ──────────────────────────────────────────────────────
    - name: worker
      daemon: true
      inputs:
        parameters:
          - name: index
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Node {{inputs.parameters.index}} starting: POD_IP=$POD_IP MONITOR_HOST=$MONITOR_HOST"
            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw $WORKERS_PER_NODE \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Mortal worker (drops after drop-delay) ────────────────────────────────
    - name: mortal-worker
      daemon: true
      inputs:
        parameters:
          - name: index
          - name: drop-delay
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "Node {{inputs.parameters.index}} starting (drops after {{inputs.parameters.drop-delay}}s)"

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw $WORKERS_PER_NODE \
              -i {{inputs.parameters.index}} 2>&1 &
            MRUN_PID=$!

            sleep {{inputs.parameters.drop-delay}}
            echo "=== Simulating node drop: killing node {{inputs.parameters.index}} ==="
            kill $MRUN_PID
            wait $MRUN_PID 2>/dev/null || true
            echo "Node {{inputs.parameters.index}} dropped."
            exit 0
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Late mortal worker (joins after join-delay, drops after run-duration) ──
    - name: late-mortal-worker
      daemon: true
      inputs:
        parameters:
          - name: index
          - name: join-delay
          - name: run-duration
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            echo "Replacement node {{inputs.parameters.index}} waiting {{inputs.parameters.join-delay}}s before connecting..."
            sleep {{inputs.parameters.join-delay}}

            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "=== Replacement node {{inputs.parameters.index}} connecting (mortal, drops after {{inputs.parameters.run-duration}}s): POD_IP=$POD_IP ==="

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw $WORKERS_PER_NODE \
              -i {{inputs.parameters.index}} 2>&1 &
            MRUN_PID=$!

            sleep {{inputs.parameters.run-duration}}
            echo "=== Simulating node drop: killing replacement node {{inputs.parameters.index}} ==="
            kill $MRUN_PID
            wait $MRUN_PID 2>/dev/null || true
            echo "Replacement node {{inputs.parameters.index}} dropped."
            exit 0
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Late worker (joins after join-delay, stays alive) ─────────────────────
    - name: late-worker
      daemon: true
      inputs:
        parameters:
          - name: index
          - name: join-delay
      metadata:
        labels:
          role: worker
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command: [bash, -c]
        args:
          - |
            echo "Replacement node {{inputs.parameters.index}} waiting {{inputs.parameters.join-delay}}s before connecting..."
            sleep {{inputs.parameters.join-delay}}

            until MONITOR_IP=$(python3 -c "import socket; print(socket.gethostbyname('$MONITOR_DNS'))" 2>/dev/null); do
              echo "Waiting for monitor DNS..."
              sleep 2
            done
            export MONITOR_HOST=$MONITOR_IP
            echo "=== Replacement node {{inputs.parameters.index}} connecting (final): POD_IP=$POD_IP ==="

            python3 -u -m mosaic.cli.mrun --node --phone-home \
              --address $POD_IP --port 3000 \
              -nw $WORKERS_PER_NODE \
              -i {{inputs.parameters.index}} 2>&1
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: MONITOR_DNS
            value: "monitor-svc-{{workflow.name}}"
          - name: MONITOR_PORT
            value: "{{workflow.parameters.monitor-port}}"
          - name: PUBSUB_PORT
            value: "{{workflow.parameters.pubsub-port}}"
          - name: WORKERS_PER_NODE
            value: "{{workflow.parameters.workers-per-node}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi

    # ── Gradient accumulator ──────────────────────────────────────────────────
    - name: gradient-accumulator
      daemon: true
      metadata:
        labels:
          role: gradient-accumulator
          workflow: "{{workflow.name}}"
      container:
        image: "{{workflow.parameters.image}}"
        imagePullPolicy: Never
        command:
          - python3
          - -m
          - mosaic.runtime.gradient_accumulator
        env:
          - name: OMP_NUM_THREADS
            value: "2"
          - name: NUM_ITERS
            value: "{{workflow.parameters.num-iters}}"
          - name: ARTIFACT_ENDPOINT
            value: "minio.argo.svc.cluster.local:9000"
          - name: ARTIFACT_ACCESS_KEY
            value: "admin"
          - name: ARTIFACT_SECRET_KEY
            value: "password"
          - name: ARTIFACT_BUCKET
            value: "stride-data"
          - name: ARTIFACT_BACKEND
            value: "minio"
          - name: ARTIFACT_RUN_ID
            value: "{{workflow.name}}"
        resources:
          requests:
            cpu: "250m"
            memory: 1Gi
