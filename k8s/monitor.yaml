# Mosaic Monitor Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosaic-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosaic-monitor
  template:
    metadata:
      labels:
        app: mosaic-monitor
    spec:
      containers:
        - name: monitor
          image: mosaic-worker:latest
          imagePullPolicy: Never  # Use local image in Minikube
          args:
            - /app/k8s_inversion.py
            - --monitor
          env:
            - name: MONITOR_PORT
              value: "3000"
            - name: PUBSUB_PORT
              value: "3001"
          ports:
            - containerPort: 3000
              name: comms
            - containerPort: 3001
              name: pubsub
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mosaic-monitor
spec:
  selector:
    app: mosaic-monitor
  ports:
    - name: comms
      port: 3000
      targetPort: 3000
    - name: pubsub
      port: 3001
      targetPort: 3001
